name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: ./gradlew :module:assembleRelease
      - uses: actions/upload-artifact@v3
        with:
          name: module
          path: module/build/outputs/*.zip
